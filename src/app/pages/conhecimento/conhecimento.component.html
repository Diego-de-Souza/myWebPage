<section class="conhecimento-cards-section">
    <h2 class="main-title">{{ 'knowledge.title' | translate }}</h2>
    <div class="cards-wrapper">
        <button class="card" (click)="navigateTo('artigos')">
            <span class="card-icon"><i class="fas fa-file-alt"></i></span>
            <span class="card-title">{{ 'knowledge.cards.articles.title' | translate }}</span>
            <span class="card-desc">{{ 'knowledge.cards.articles.desc' | translate }}</span>
        </button>
        <button class="card" (click)="navigateTo('curiosidades')">
            <span class="card-icon"><i class="fas fa-lightbulb"></i></span>
            <span class="card-title">{{ 'knowledge.cards.curiosities.title' | translate }}</span>
            <span class="card-desc">{{ 'knowledge.cards.curiosities.desc' | translate }}</span>
        </button>
        <!-- Adicione outros cards aqui conforme necessário -->
    </div>
</section>
