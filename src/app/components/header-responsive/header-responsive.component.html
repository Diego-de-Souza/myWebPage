<header class="headerResponsive" [class.open]="isMenuOpen">
  <div class="headerResponsive_principal">
    <button class="brand" type="button" (click)="openHome(); $event.stopPropagation()" [attr.aria-label]="'nav.home' | translate">
      <img src="../../../assets/imgs/favicon/favicon-32x32.png" alt="Logo Diego Dev">
      <span>Diego.dev</span>
    </button>

    <button id="nav-icon2" (click)="toggleMenu(); $event.stopPropagation()" #navIcon type="button" [attr.aria-expanded]="isMenuOpen" [attr.aria-label]="'menuFloat.title' | translate">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  @if (isMenuOpen) {
    <nav class="headerResponsive_secundario" aria-label="Menu mobile principal">
      <ul id="link-pages-responsive">
        <li class="link-pages__li">
          <button class="menu-link magnetic-btn" (click)="openHome()"><i class="fas fa-house"></i> {{ 'nav.home' | translate }}</button>
        </li>
        <li class="link-pages__li">
          <button class="menu-link magnetic-btn" (click)="openServicos()"><i class="fas fa-briefcase"></i> {{ 'nav.services' | translate }}</button>
        </li>
        <li class="link-pages__li">
          <button class="menu-link magnetic-btn" (click)="openConhecimento()"><i class="fas fa-brain"></i> {{ 'nav.knowledge' | translate }}</button>
        </li>
        <li class="link-pages__li">
          <button class="menu-link magnetic-btn" (click)="openContato()"><i class="fas fa-envelope"></i> {{ 'nav.contact' | translate }}</button>
        </li>
      </ul>

      <div class="demiter"></div>

      <app-language-switcher></app-language-switcher>
      <div class="demiter"></div>

      <ul id="link-user-responsive">
        <li class="link-user__redes">
          <a href="https://www.instagram.com/diegodesouza_dev/" class="link-user__redes__link magnetic-btn" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i> Instagram
          </a>
        </li>
        <li class="link-user__redes">
          <a href="https://www.linkedin.com/in/diegodesouza-devweb/" class="link-user__redes__link magnetic-btn" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-linkedin-in"></i> LinkedIn
          </a>
        </li>
        <li class="link-user__redes">
          <a href="https://www.facebook.com/diegodesouza102" class="link-user__redes__link magnetic-btn" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-facebook-f"></i> Facebook
          </a>
        </li>
        <li class="link-user__redes">
          <a href="https://github.com/Diego-de-Souza" class="link-user__redes__link magnetic-btn" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-github"></i> GitHub
          </a>
        </li>
        <li class="link-user__redes">
          <app-contact-whatsapp></app-contact-whatsapp>
        </li>
      </ul>

      <div class="demiter"></div>
      <app-weather
        menuAberto="{{tipoData}}"
        class="link-user-date"
        menuFloat="true"
        [compact]="true"
        [showWeather]="false"></app-weather>
    </nav>
  }
</header>
